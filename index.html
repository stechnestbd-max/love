<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just For You ❤️</title>

<style>
body{
    margin:0;
    background:#000;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, sans-serif;
    color:white;
}

/* Canvas */
canvas{
    position:absolute;
}

/* Input Box */
.centerBox{
    position:absolute;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
}

/* Input */
input{
    padding:14px 25px;
    border-radius:30px;
    border:none;
    outline:none;
    font-size:18px;
    text-align:center;
    box-shadow:0 0 20px rgba(255,0,0,0.4);
    width:250px;
    max-width:80vw;
}

/* Button */
button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    background:red;
    color:white;
    box-shadow:0 0 15px rgba(255,0,0,0.6);
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

/* Name inside heart */
.nameDisplay{
    position:absolute;
    font-size:clamp(22px,6vw,34px);
    font-weight:bold;
    opacity:0;
    transition:2s;
    text-shadow:0 0 20px red;
    text-align:center;
}

/* Message under heart */
.message{
    position:absolute;
    top:88%;   /* age 65% chilo */
    width:100%;
    text-align:center;
    opacity:0;
    transition:2s;
    font-size:clamp(14px,4vw,20px);
    text-shadow:0 0 8px red;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="nameDisplay" id="nameDisplay"></div>
<div class="message" id="message">This heart just for you ❤️</div>

<div class="centerBox" id="inputBox">
    <input type="text" id="nameInput" placeholder="Enter Your Name">
    <button onclick="startHeart()">Click here❤️</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let particles = [];
let heartPoints = [];
let pulseScale = 1;
let pulseDirection = 1;

function heartShape(t){
    let x = 16 * Math.pow(Math.sin(t),3);
    let y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
    return {x:x, y:-y};
}

function createHeart(){
    heartPoints=[];
    let baseScale = Math.min(canvas.width, canvas.height)/45; // smaller heart

    for(let i=0;i<Math.PI*2;i+=0.02){ // more particles (fuller heart)
        let pos = heartShape(i);
        heartPoints.push({
            x: canvas.width/2 + pos.x*baseScale,
            y: canvas.height/2 + pos.y*baseScale
        });
    }
}

class Particle{
    constructor(x,y){
        this.x = Math.random()*canvas.width;
        this.y = Math.random()*canvas.height;
        this.tx = x;
        this.ty = y;
    }

    move(){
        this.x += (this.tx - this.x)*0.08;
        this.y += (this.ty - this.y)*0.08;
    }

    draw(){
        ctx.fillStyle="rgba(255,0,0,0.9)";
        ctx.shadowBlur = 15;
        ctx.shadowColor = "red";
        ctx.beginPath();
        ctx.arc(this.x,this.y,2.2,0,Math.PI*2);
        ctx.fill();
    }
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Pulse animation
    pulseScale += pulseDirection * 0.002;
    if(pulseScale > 1.05 || pulseScale < 0.95){
        pulseDirection *= -1;
    }

    particles.forEach(p=>{
        p.move();
        p.draw();
    });

    requestAnimationFrame(animate);
}

function startHeart(){
    const input = document.getElementById("nameInput");
    const enteredName = input.value.trim();
    if(enteredName === "") return;

    document.getElementById("inputBox").style.display="none";

    createHeart();
    particles=[];
    heartPoints.forEach(point=>{
        particles.push(new Particle(point.x,point.y));
    });

    setTimeout(()=>{
        const nameEl = document.getElementById("nameDisplay");
        nameEl.innerText = enteredName;
        nameEl.style.opacity = 1;

        document.getElementById("message").style.opacity = 1;
    },800);
}

document.getElementById("nameInput").addEventListener("keypress",function(e){
    if(e.key==="Enter"){
        startHeart();
    }
});

animate();
</script>

</body>
</html>
