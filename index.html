<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just For You ❤️</title>

<style>
body{
    margin:0;
    background:#000;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, sans-serif;
    color:white;
}

/* Canvas */
canvas{
    position:absolute;
}

/* Center input */
input{
    position:absolute;
    padding:15px 25px;
    border-radius:30px;
    border:none;
    outline:none;
    font-size:18px;
    text-align:center;
    box-shadow:0 0 20px rgba(255,0,0,0.4);
}

/* Name inside heart */
.nameDisplay{
    position:absolute;
    font-size:32px;
    font-weight:bold;
    opacity:0;
    transition:2s;
    text-shadow:0 0 15px red;
}

.message{
    position:absolute;
    bottom:50px;
    opacity:0;
    transition:1.5s;
    font-size:20px;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="nameDisplay" id="nameDisplay"></div>
<div class="message" id="message">This heart beats for you ❤️</div>

<input type="text" id="nameInput" placeholder="Enter Your Name & Press Enter">

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let particles = [];
let heartPoints = [];

function heartShape(t){
    let x = 16 * Math.pow(Math.sin(t),3);
    let y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
    return {x:x, y:-y};
}

function createHeart(){
    heartPoints=[];
    for(let i=0;i<Math.PI*2;i+=0.04){
        let pos = heartShape(i);
        heartPoints.push({
            x: canvas.width/2 + pos.x*12,
            y: canvas.height/2 + pos.y*12
        });
    }
}

class Particle{
    constructor(x,y){
        this.x = Math.random()*canvas.width;
        this.y = Math.random()*canvas.height;
        this.tx = x;
        this.ty = y;
    }

    move(){
        this.x += (this.tx - this.x)*0.06;
        this.y += (this.ty - this.y)*0.06;
    }

    draw(){
        ctx.fillStyle="red";
        ctx.beginPath();
        ctx.arc(this.x,this.y,2,0,Math.PI*2);
        ctx.fill();
    }
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        p.move();
        p.draw();
    });
    requestAnimationFrame(animate);
}

document.getElementById("nameInput").addEventListener("keypress",function(e){
    if(e.key==="Enter" && this.value.trim()!==""){
        const enteredName = this.value.trim();

        this.style.display="none";

        createHeart();
        particles=[];
        heartPoints.forEach(point=>{
            particles.push(new Particle(point.x,point.y));
        });

        // show name after particles settle
        setTimeout(()=>{
            const nameEl = document.getElementById("nameDisplay");
            nameEl.innerText = enteredName;
            nameEl.style.opacity = 1;

            document.getElementById("message").style.opacity = 1;
        },1000);
    }
});

animate();
</script>

</body>
</html>
